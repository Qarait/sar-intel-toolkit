search_area:
  min_lat: 43.6490
  min_lon: -79.3810
  max_lat: 43.6510
  max_lon: -79.3790

mission:
  altitude_m: 60.0
  lane_spacing_m: 20.0
  forward_step_m: 20.0
  drone_speed_mps: 8.0

telemetry:
  mode: simulated
  replay_path: sample_data/telemetry.csv

video:
  path: sample_data/video.mp4
  frame_stride: 2
  start_time_utc: "2026-04-17T19:30:00Z"

detector:
  model: yolo26n.pt
  confidence_threshold: 0.5

camera:
  horizontal_fov_deg: 78.0
  vertical_fov_deg: 49.0

geotagging:
  mode: heading_aware_nadir
  target_point: bbox_center
  include_geotag_metadata: false

tracking:
  enabled: true
  include_track_id_in_alerts: false
  iou_threshold: 0.25
  max_frame_gap: 10
  max_position_distance_m: 12.0
  min_hits: 3
  motion_model: kalman
  kalman:
    process_noise: 1.0
    measurement_noise: 10.0
    initial_uncertainty: 100.0

track_scoring:
  enabled: true
  high_confidence_threshold: 0.80
  possible_confidence_threshold: 0.55
  weights:
    mean_confidence: 0.55
    max_confidence: 0.25
    detection_density: 0.20

geojson:
  enabled: true
  tracks_path: output/tracks.geojson
  min_track_score: 0.0
  include_marginal_tracks: true

output:
  alerts_path: output/alerts.json
  tracks_path: output/tracks.json
  waypoints_path: sample_data/path.json
